name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # kept for future npm Trusted Publishing (OIDC)

jobs:
  release:
    name: Version or publish via Changesets
    runs-on: ubuntu-latest
    steps:
      # Using a GitHub App token (instead of the default GITHUB_TOKEN) so that
      # PRs created by changesets trigger downstream workflows (ci.yml).
      # GitHub deliberately suppresses workflow_run events for activity
      # authored by GITHUB_TOKEN to avoid infinite loops — see docs/release-setup.md.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # No NPM_TOKEN / NODE_AUTH_TOKEN: authentication to npm uses
          # Trusted Publishing (OIDC). permissions.id-token:write is set at
          # the workflow level; publishConfig.provenance:true in package.json
          # makes `npm publish` emit an attestation. See docs/release-setup.md.
